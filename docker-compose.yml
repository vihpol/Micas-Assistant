services:
  backend:
    build:
      context: ./backend
    environment:
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4.1-mini}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-1.5-flash}
    ports:
      - "8000:8000"

  frontend:
    build:
      context: ./frontend
      args:
        BACKEND_URL: http://backend:8000
        NEXT_PUBLIC_GOOGLE_CSE_ID: ${NEXT_PUBLIC_GOOGLE_CSE_ID:-}
    environment:
      BACKEND_URL: http://backend:8000
      NEXT_PUBLIC_GOOGLE_CSE_ID: ${NEXT_PUBLIC_GOOGLE_CSE_ID:-}
    ports:
      - "3000:3000"
    depends_on:
      - backend
