services:
  backend:
    image: micas-assistops-backend
    build:
      context: ./backend
    environment:
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4.1-mini}
    ports:
      - "8010:8000"

  frontend:
    image: micas-assistops-frontend
    build:
      context: ./frontend
      args:
        BACKEND_URL: http://backend:8000
        NEXT_PUBLIC_GOOGLE_CSE_ID: ${NEXT_PUBLIC_GOOGLE_CSE_ID:-}
    environment:
      BACKEND_URL: http://backend:8000
      NEXT_PUBLIC_GOOGLE_CSE_ID: ${NEXT_PUBLIC_GOOGLE_CSE_ID:-}
    ports:
      - "3010:3000"
    depends_on:
      - backend
